name: Test Pipeline

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  test-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python for MCP servers
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MCP dependencies
        run: pip install mcp httpx

      - name: Diagnose MCP server startup
        run: |
          echo "=== Python version ==="
          python3 --version
          echo "=== MCP import test ==="
          python3 -c "from mcp.server.fastmcp import FastMCP; print('FastMCP import OK')"
          echo "=== .mcp.json exists? ==="
          cat .mcp.json | head -5
          echo "=== Try starting slack server (5s timeout) ==="
          timeout 5 python3 mcp-servers/slack/server.py 2>&1 || echo "Server exited (expected - no stdin)"
          echo "=== Env var check ==="
          echo "SLACK_WORKSPACE_1_NAME=${SLACK_WORKSPACE_1_NAME:-NOT SET}"
          echo "SLACK_WORKSPACE_1_TEAM_ID length: ${#SLACK_WORKSPACE_1_TEAM_ID}"
          echo "SLACK_WORKSPACE_1_BOT_TOKEN length: ${#SLACK_WORKSPACE_1_BOT_TOKEN}"
        env:
          SLACK_WORKSPACE_1_BOT_TOKEN: ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}
          SLACK_WORKSPACE_1_TEAM_ID: ${{ secrets.SLACK_WORKSPACE_1_TEAM_ID }}
          SLACK_WORKSPACE_1_NAME: ${{ secrets.SLACK_WORKSPACE_1_NAME }}

      - name: Test Claude Code + MCP servers
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Quick diagnostic test. Do these things and nothing else:
            1. Run: ls outputs/
            2. Check if any MCP tools are available by searching for "mcp" or "slack" tools via ToolSearch
            3. If MCP tools found, call slack list_workspaces. If not found, report "NO MCP TOOLS AVAILABLE"
            4. Run: cat .mcp.json
            5. Run: cat ~/.claude/settings.json
            6. Write outputs/test-pipeline.txt with "Pipeline test $(date). MCP tools: [list what you found]"

            Report what worked and what failed. Keep it brief. Do NOT run any skills.
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6
        env:
          SLACK_WORKSPACE_1_BOT_TOKEN: ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}
          SLACK_WORKSPACE_1_TEAM_ID: ${{ secrets.SLACK_WORKSPACE_1_TEAM_ID }}
          SLACK_WORKSPACE_1_NAME: ${{ secrets.SLACK_WORKSPACE_1_NAME }}

      - name: Commit test output
        run: |
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add outputs/ || true
          git diff --staged --quiet || git commit -m "Test pipeline $(date +%Y-%m-%d)"
          git push || true
