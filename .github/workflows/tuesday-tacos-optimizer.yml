name: Tuesday TACoS Optimizer

on:
  schedule:
    - cron: '0 7 * * 2'  # Tuesday 9:00 AM Israel time (UTC+2)
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  run-tacos:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python for MCP servers
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MCP dependencies
        run: pip install mcp httpx

      - name: Run ppc-tacos-optimizer skill
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the ppc-tacos-optimizer skill.
            After completing the skill, use the notification-hub skill to post
            the results summary to Slack channel #claude-ppc-updates.
            If the notification-hub fails, that's OK. Do not retry notifications.
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --mcp-config ./.mcp.json
        env:
          ADS_API_CLIENT_ID: ${{ secrets.ADS_API_CLIENT_ID }}
          ADS_API_CLIENT_SECRET: ${{ secrets.ADS_API_CLIENT_SECRET }}
          ADS_API_REFRESH_TOKEN: ${{ secrets.ADS_API_REFRESH_TOKEN }}
          ADS_API_PROFILE_US: ${{ secrets.ADS_API_PROFILE_US }}
          SELLERBOARD_SALES_DETAILED_7D: ${{ secrets.SELLERBOARD_SALES_DETAILED_7D }}
          SELLERBOARD_PPC_MARKETING: ${{ secrets.SELLERBOARD_PPC_MARKETING }}
          SLACK_WORKSPACE_1_BOT_TOKEN: ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}
          SLACK_WORKSPACE_1_TEAM_ID: ${{ secrets.SLACK_WORKSPACE_1_TEAM_ID }}
          SLACK_WORKSPACE_1_NAME: ${{ secrets.SLACK_WORKSPACE_1_NAME }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Commit output files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add outputs/ || true
          git diff --staged --quiet || git commit -m "Tuesday TACoS optimizer $(date +%Y-%m-%d)"
          git push || true

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"channel":"#claude-alerts","text":"⚠️ Tuesday TACoS optimizer workflow FAILED at '"$(date -u +%Y-%m-%d' '%H:%M)"' UTC. Check GitHub Actions logs."}' \
            https://slack.com/api/chat.postMessage || true
