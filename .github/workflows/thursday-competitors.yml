name: Thursday Competitor Tracker

on:
  schedule:
    - cron: '0 7 * * 4'  # Thursday 9:00 AM Israel time (UTC+2)
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  run-competitor-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python for MCP servers
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MCP dependencies
        run: pip install mcp httpx

      - name: Run competitor-price-serp-tracker skill
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the competitor-price-serp-tracker skill.
            After completing the skill, use the notification-hub skill to post
            the results summary to Slack channel #claude-competitor-watch.
            If the notification-hub fails, that's OK. Do not retry notifications.
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          DATADIVE_API_KEY: ${{ secrets.DATADIVE_API_KEY }}
          SP_API_CLIENT_ID: ${{ secrets.SP_API_CLIENT_ID }}
          SP_API_CLIENT_SECRET: ${{ secrets.SP_API_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_SELLER_ID: ${{ secrets.SP_API_SELLER_ID }}
          SP_API_MARKETPLACE_US: ${{ secrets.SP_API_MARKETPLACE_US }}
          SLACK_WORKSPACE_1_BOT_TOKEN: ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}
          SLACK_WORKSPACE_1_TEAM_ID: ${{ secrets.SLACK_WORKSPACE_1_TEAM_ID }}
          SLACK_WORKSPACE_1_NAME: ${{ secrets.SLACK_WORKSPACE_1_NAME }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Commit output files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add outputs/ || true
          git diff --staged --quiet || git commit -m "Thursday competitor tracker $(date +%Y-%m-%d)"
          git push || true

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SLACK_WORKSPACE_1_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"channel":"#claude-alerts","text":"⚠️ Thursday competitor tracker workflow FAILED at '"$(date -u +%Y-%m-%d' '%H:%M)"' UTC. Check GitHub Actions logs."}' \
            https://slack.com/api/chat.postMessage || true
