# Craftiloo Skill Runner Configuration
# Central config for all automated skill runs on the mini PC.
# Adding a new skill = adding a YAML block under `skills:`.

defaults:
  workspace: /home/yali/workspace
  log_dir: /var/log/claude
  model: claude-sonnet-4-6
  max_turns: 30
  timeout_minutes: 25
  git_pull: true
  git_commit: true
  git_push: true
  git_add_paths:
    - outputs/
    - .claude/skills/
  commit_prefix: "auto"
  env_file: /home/yali/workspace/.env
  lockfile: /tmp/claude-skill.lock
  min_gap_minutes: 2
  allowed_tools:
    - "Read"
    - "Write"
    - "Edit"
    - "Glob"
    - "Grep"
    - "Bash(python3*)"
    - "Bash(pip3*)"
    - "Bash(git*)"
    - "Bash(ls*)"
    - "Bash(cat*)"
    - "Bash(mkdir*)"
    - "Bash(date*)"
    - "Bash(cd*)"
    - "Bash(cp*)"
    - "Bash(head*)"
    - "Bash(tail*)"
    - "Bash(wc*)"
    - "Bash(sort*)"
    - "Bash(curl*)"
    - "mcp__amazon-ads-api__*"
    - "mcp__amazon-sp-api__*"
    - "mcp__sellerboard__*"
    - "mcp__slack__*"
    - "mcp__datadive__*"
    - "mcp__notion__*"
    - "mcp__apify__*"
    - "mcp__asana__*"
  prompt_suffix: |
    After completing the skill, use the notification-hub skill to post
    the results summary to Slack.
    If the notification-hub fails, that's OK — do not retry notifications.
    EFFICIENCY RULES:
    - Keep Slack messages under 2000 chars.
    - Do NOT post to #claude-alerts. The automation handles failure alerts.
    - Target: complete in the fewest turns possible.

# ---------------------------------------------------------------------------
# Skill definitions
# Each skill inherits all defaults. Override only what differs.
# The `prompt` field is optional — if omitted, defaults to:
#   "Run the {skill-name} skill."
# ---------------------------------------------------------------------------

skills:

  # === DAILY (every day) ===

  daily-market-intel:
    timeout_minutes: 25
    max_turns: 30
    slack_channel: "#claude-morning-brief"
    schedule: "Daily 8:00 AM IST"

  ppc-daily-health:
    timeout_minutes: 20
    max_turns: 25
    prompt: |
      Run the ppc-daily-health skill.
      EFFICIENCY RULES:
      - Do NOT update individual portfolio tracker JSON files. Only update agent-state.json.
    slack_channel: "#claude-ppc-updates"
    schedule: "Daily 8:30 AM IST"

  # === MONDAY ===

  weekly-ppc-analysis:
    timeout_minutes: 30
    max_turns: 80
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 9:00 AM IST"

  # === MONDAY (data collection pipeline — 5 skills sequential) ===

  ppc-tacos-optimizer:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-tacos-optimizer skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 9:00 AM IST"

  ppc-portfolio-summary:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-portfolio-summary skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 9:30 AM IST"

  keyword-rank-optimizer:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the keyword-rank-optimizer skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 10:00 AM IST"

  ppc-bid-recommender:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-bid-recommender skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 10:30 AM IST"

  ppc-search-term-harvester:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-search-term-harvester skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 11:00 AM IST"

  # === TUESDAY (autonomous deep-dive session — reads Monday pipeline files) ===

  ppc-agent-autonomous-tuesday:
    timeout_minutes: 55
    max_turns: 80
    prompt: |
      Run the ppc-agent skill. AUTONOMOUS Tuesday session.
      Read today's Monday pipeline files, cross-reference all data sources,
      synthesize findings, and produce the weekly brief + actions.json.
      Do NOT make any API write calls. Report only.
    slack_channel: "#claude-ppc-updates"
    git_add_paths:
      - outputs/research/ppc-agent/sessions/
      - outputs/research/ppc-agent/state/
    schedule: "Tuesday 12:00 PM IST"

  # === FRIDAY (autonomous validation session — validates applied actions) ===

  ppc-agent-autonomous-friday:
    timeout_minutes: 40
    max_turns: 50
    prompt: |
      Run the ppc-agent skill. AUTONOMOUS Friday session.
      Validate action items applied since Tuesday's session.
      Compare before/after metrics, score each action, update validation records.
      Do NOT make any bid/budget write calls. Validation only.
    slack_channel: "#claude-ppc-updates"
    git_add_paths:
      - outputs/research/ppc-agent/sessions/
      - outputs/research/ppc-agent/state/
    schedule: "Friday 12:00 PM IST"

  # === THURSDAY ===

  competitor-price-serp-tracker:
    timeout_minutes: 35
    max_turns: 40
    slack_channel: "#claude-competitor-watch"
    schedule: "Thursday 9:00 AM IST"

  # === SUNDAY ===

  brand-analytics-weekly:
    timeout_minutes: 30
    max_turns: 40
    slack_channel: "#claude-product-updates"
    schedule: "Sunday 9:00 AM IST"

  # === MONTHLY (1st of month) ===

  ppc-monthly-review:
    timeout_minutes: 35
    max_turns: 50
    git_add_paths:
      - outputs/
      - context/business.md
      - .claude/skills/
    slack_channel: "#claude-ppc-updates"
    schedule: "1st of month 10:00 AM IST"
