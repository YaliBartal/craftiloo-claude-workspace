# Craftiloo Skill Runner Configuration
# Central config for all automated skill runs on the mini PC.
# Adding a new skill = adding a YAML block under `skills:`.

defaults:
  workspace: /home/yali/workspace
  log_dir: /var/log/claude
  model: claude-sonnet-4-6
  max_turns: 30
  timeout_minutes: 25
  git_pull: true
  git_commit: true
  git_push: true
  git_add_paths:
    - outputs/
    - .claude/skills/
  commit_prefix: "auto"
  env_file: /home/yali/workspace/.env
  lockfile: /tmp/claude-skill.lock
  min_gap_minutes: 2
  allowed_tools:
    - "Read"
    - "Write"
    - "Edit"
    - "Glob"
    - "Grep"
    - "Bash(python3*)"
    - "Bash(pip3*)"
    - "Bash(git*)"
    - "Bash(ls*)"
    - "Bash(cat*)"
    - "Bash(mkdir*)"
    - "Bash(date*)"
    - "Bash(cd*)"
    - "Bash(cp*)"
    - "Bash(head*)"
    - "Bash(tail*)"
    - "Bash(wc*)"
    - "Bash(sort*)"
    - "Bash(curl*)"
    - "mcp__amazon-ads-api__*"
    - "mcp__amazon-sp-api__*"
    - "mcp__sellerboard__*"
    - "mcp__slack__*"
    - "mcp__datadive__*"
    - "mcp__notion__*"
    - "mcp__apify__*"
    - "mcp__asana__*"
  prompt_suffix: |
    After completing the skill, use the notification-hub skill to post
    the results summary to Slack.
    If the notification-hub fails, that's OK — do not retry notifications.
    EFFICIENCY RULES:
    - Keep Slack messages under 2000 chars.
    - Do NOT post to #claude-alerts. The automation handles failure alerts.
    - Target: complete in the fewest turns possible.

# ---------------------------------------------------------------------------
# Skill definitions
# Each skill inherits all defaults. Override only what differs.
# The `prompt` field is optional — if omitted, defaults to:
#   "Run the {skill-name} skill."
# ---------------------------------------------------------------------------

skills:

  # === DAILY (every day) ===

  daily-market-intel:
    timeout_minutes: 25
    max_turns: 30
    slack_channel: "#claude-morning-brief"
    schedule: "Daily 8:00 AM IST"

  ppc-daily-health:
    timeout_minutes: 20
    max_turns: 25
    prompt: |
      Run the ppc-daily-health skill.
      EFFICIENCY RULES:
      - Do NOT update individual portfolio tracker JSON files. Only update agent-state.json.
    slack_channel: "#claude-ppc-updates"
    schedule: "Daily 8:30 AM IST"

  # === SUNDAY (continued — after brand-analytics-weekly) ===

  weekly-ppc-analysis:
    timeout_minutes: 50
    max_turns: 80
    slack_channel: "#claude-ppc-updates"
    schedule: "Sunday 10:00 AM IST"

  # === MONDAY (data collection pipeline — 3 skills every week, +1 alternating each week) ===
  # Even ISO weeks: tacos runs, keyword-rank skips
  # Odd ISO weeks:  keyword-rank runs, tacos skips

  ppc-tacos-optimizer:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      FIRST: Check ISO week parity with this exact command:
        WEEK=$(date +%V | sed 's/^0//'); echo $((WEEK % 2))
      If result is 1 (odd week): output "Bi-weekly skip: tacos runs on even weeks (current week $(date +%V)). No action taken." and stop immediately.
      If result is 0 (even week): proceed with the ppc-tacos-optimizer skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 10:00 AM IST"

  ppc-portfolio-summary:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-portfolio-summary skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 10:35 AM IST"

  keyword-rank-optimizer:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      FIRST: Check ISO week parity with this exact command:
        WEEK=$(date +%V | sed 's/^0//'); echo $((WEEK % 2))
      If result is 0 (even week): output "Bi-weekly skip: keyword-rank runs on odd weeks (current week $(date +%V)). No action taken." and stop immediately.
      If result is 1 (odd week): proceed with the keyword-rank-optimizer skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 11:10 AM IST"

  ppc-bid-recommender:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-bid-recommender skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 11:45 AM IST"

  ppc-search-term-harvester:
    timeout_minutes: 25
    max_turns: 30
    prompt: |
      Run the ppc-search-term-harvester skill. AUTONOMOUS
    slack_channel: "#claude-ppc-updates"
    schedule: "Monday 12:20 PM IST"

  # === TUESDAY (autonomous deep-dive session — reads Sunday weekly-ppc + Monday pipeline) ===

  ppc-agent-autonomous-tuesday:
    timeout_minutes: 55
    max_turns: 80
    prompt: |
      Run the ppc-agent skill. AUTONOMOUS Tuesday session.

      Data sources to read (in this order):
      1. Sunday's weekly-ppc-analysis output — find the most recent snapshot in
         outputs/research/ppc-weekly/snapshots/ (should be <48h old, from yesterday).
      2. Yesterday's Monday pipeline files — find all autonomous-*.json files written
         yesterday across outputs/research/ppc-agent/ subdirectories.

      Cross-reference all data sources, synthesize findings, and produce the
      weekly brief + actions.json.
      Do NOT make any API write calls. Report only.
    slack_channel: "#claude-ppc-updates"
    git_add_paths:
      - outputs/research/ppc-agent/sessions/
      - outputs/research/ppc-agent/state/
    schedule: "Tuesday 12:00 PM IST"

  # === FRIDAY (autonomous validation session — validates PREVIOUS week's Tuesday actions) ===

  ppc-agent-autonomous-friday:
    timeout_minutes: 40
    max_turns: 50
    prompt: |
      Run the ppc-agent skill. AUTONOMOUS Friday session.

      Goal: Validate action items from LAST WEEK's Tuesday session (not this week's).
      Step 1: List all session folders in outputs/research/ppc-agent/sessions/ sorted
              by date. Find the Tuesday session from ~10 days ago — last week's, NOT
              this week's Tuesday which is only 3 days old.
      Step 2: Load that session's actions.json.
      Step 3: Pull current metrics and compare to the baseline from that session date.
      Step 4: Score each action as WORKED / PARTIAL / INCONCLUSIVE / FAILED.
      Step 5: Write validation results back to that session's folder.

      Do NOT make any bid/budget write calls. Validation only.
    slack_channel: "#claude-ppc-updates"
    git_add_paths:
      - outputs/research/ppc-agent/sessions/
      - outputs/research/ppc-agent/state/
    schedule: "Friday 12:00 PM IST"

  # === WEDNESDAY (inventory) ===

  inventory-weekly-health:
    timeout_minutes: 40
    max_turns: 50
    prompt: |
      Run the inventory-weekly-health skill. AUTONOMOUS weekly run.
      Pull all inventory data, update seasonal model, analyze, write brief, post to Slack.
      If any products are CRITICAL or LOW, include reorder recommendations in the brief.
    slack_channel: "#claude-inventory"
    schedule: "Wednesday 9:00 AM IST"

  # === THURSDAY ===

  competitor-price-serp-tracker:
    timeout_minutes: 35
    max_turns: 40
    slack_channel: "#claude-competitor-watch"
    schedule: "Thursday 9:00 AM IST"

  # === SUNDAY ===

  brand-analytics-weekly:
    timeout_minutes: 50
    max_turns: 60
    git_add_paths:
      - outputs/research/brand-analytics/
      - .claude/skills/brand-analytics-weekly/
    slack_channel: "#claude-product-updates"
    schedule: "Wednesday 2:00 PM IST"

  # === MONTHLY (1st of month) ===

  ppc-monthly-review:
    timeout_minutes: 35
    max_turns: 50
    git_add_paths:
      - outputs/
      - context/business.md
      - .claude/skills/
    slack_channel: "#claude-ppc-updates"
    schedule: "1st of month 10:00 AM IST"
